[package]
name = "vr_ui"  # REQUIRED: Extension name for Kit to identify this extension
title = "VR UI"
version = "0.1.0"  # Semantic Versioning is used: https://semver.org/
description = "VR UI extension for displaying UI elements in VR space and handling VR interactions."
category = "VR"  # How to categorize this in the Extension Manager
changelog = "docs/CHANGELOG.md"
icon = "data/icon.png"  # Icon to show in the Extension Manager
keywords = ["kit", "vr", "xr", "ui", "extension"]  # Search keywords for the Extension Manager
preview_image = "data/preview.png"  # Preview to show in the Extension Manager
readme  = "docs/README.md"  # Path (relative to the root) or content of readme markdown file for UI
repository = "https://github.com/NVIDIA-Omniverse/kit-app-template"  # URL of the extension source repository


[dependencies]
"omni.kit.uiapp" = {}
"omni.usd" = {}

# VR関連の依存関係 (Kit 107.3)
"omni.kit.xr.core" = {}
"omni.kit.xr.scene_view.utils" = {}  # 3D UI support (NEW API Kit 106.4+)
"omni.kit.xr.scene_view.core" = {}  # XRSceneView
"omni.kit.viewport.utility" = {}  # Viewport access


[settings]


[[python.module]]  # Main python module this extension provides, it will be publicly available as "import vr_ui"
name = "vr_ui"


[documentation]
pages = [
    "docs/Overview.md",
    "docs/CHANGELOG.md",
]


[[test]]
dependencies = [
    "omni.kit.test",
    "omni.kit.ui_test"  # UI testing extension
]

args = [
]
